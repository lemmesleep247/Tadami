name: PR build check
on:
  pull_request:
    branches:
      - main
    paths:
      - '**'
      - '!**.md'
      - '!i18n/src/commonMain/moko-resources/**/strings-aniyomi.xml'
      - '!i18n/src/commonMain/moko-resources/**/strings.xml'
      - '!i18n/src/commonMain/moko-resources/**/plurals-aniyomi.xml'
      - '!i18n/src/commonMain/moko-resources/**/plurals.xml'
      - 'i18n/src/commonMain/moko-resources/base/strings-aniyomi.xml'
      - 'i18n/src/commonMain/moko-resources/base/strings.xml'
      - 'i18n/src/commonMain/moko-resources/base/plurals-aniyomi.xml'
      - 'i18n/src/commonMain/moko-resources/base/plurals.xml'


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build app
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Build app
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --console=plain 2>&1 | tee build_release.log
          python3 tools/ci/report-release-warnings.py build_release.log --enforce

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: ./gradlew testDebugUnitTest --stacktrace --console=plain

      - name: Print unit test failures
        id: unit_test_report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          results_dir="app/build/test-results/testDebugUnitTest"
          if [ ! -d "$results_dir" ]; then
            echo "No test results directory found: $results_dir"
            exit 0
          fi
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          files = sorted(glob.glob("app/build/test-results/testDebugUnitTest/*.xml"))
          if not files:
              print("No JUnit XML files found in app/build/test-results/testDebugUnitTest")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("failed=false\n")
              raise SystemExit(0)

          failures = []
          total_tests = total_failures = total_errors = 0

          for path in files:
              root = ET.parse(path).getroot()
              total_tests += int(root.attrib.get("tests", 0))
              total_failures += int(root.attrib.get("failures", 0))
              total_errors += int(root.attrib.get("errors", 0))
              suite_name = root.attrib.get("name", "")
              for case in root.findall("testcase"):
                  failure = case.find("failure")
                  error = case.find("error")
                  if failure is None and error is None:
                      continue
                  node = failure if failure is not None else error
                  classname = case.attrib.get("classname", suite_name)
                  testname = case.attrib.get("name", "<unknown>")
                  message = (node.attrib.get("message") or "").strip()
                  text = (node.text or "").strip().splitlines()
                  detail = message or (text[0].strip() if text else "No details")
                  failures.append((classname, testname, detail))

          print(f"Unit test summary: tests={total_tests}, failures={total_failures}, errors={total_errors}")
          summary_lines = [
              "## Unit test summary",
              f"- tests: {total_tests}",
              f"- failures: {total_failures}",
              f"- errors: {total_errors}",
          ]
          if not failures:
              print("No failed tests found in JUnit XML.")
              summary_lines.append("- failed tests: none")
          else:
              print("Failed tests:")
              summary_lines.append("")
              summary_lines.append("### Failed tests")
              for classname, testname, detail in failures:
                  print(f"- {classname} > {testname}: {detail}")
                  summary_lines.append(f"- `{classname} > {testname}`: {detail}")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("\n".join(summary_lines) + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"failed={'true' if failures or total_errors or total_failures else 'false'}\n")
          PY

      - name: Fail job if unit tests failed
        if: always() && steps.unit_test_report.outputs.failed == 'true'
        shell: bash
        run: |
          echo "Unit tests failed. See the failed test list printed above and the workflow summary."
          exit 1

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-test-release-report-${{ github.sha }}
          if-no-files-found: warn
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: arm64-v8a-${{ github.sha }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk

      - name: Upload mapping
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mapping-${{ github.sha }}
          path: app/build/outputs/mapping/release

  aurora_contrast_check:
    name: Aurora Contrast Check (non-blocking)
    runs-on: 'ubuntu-24.04'
    continue-on-error: true

    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Aurora contrast validation script
        shell: pwsh
        run: |
          ./tools/ci/check_aurora_contrast.ps1 `
            -InputPath tools/ci/aurora-contrast-samples.csv `
            -MinContrast 4.5 `
            -Strict
