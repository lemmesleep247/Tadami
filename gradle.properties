android.nonTransitiveRClass=true
android.useAndroidX=true

kotlin.code.style=official
kotlin.mpp.androidSourceSetLayoutVersion=2

# Work around intermittent Gradle cache packaging corruption on Windows worktrees.
org.gradle.caching=true
org.gradle.configuration-cache=false
org.gradle.configureondemand=false
org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8
# Prefer the default Kotlin daemon for large release compiles; in-process was slower here.
# kotlin.compiler.execution.strategy=in-process
org.gradle.parallel=true
kotlin.daemon.jvmargs=-Xmx6g
